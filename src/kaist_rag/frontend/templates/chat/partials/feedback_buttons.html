{% comment %} 답변 피드백(👍/👎) + 복사/다시생성. JS: chat.js wireFeedback() {% endcomment %}
<div class="fb" data-message-id="{{ message_id }}">
  <button class="fb-btn up" title="도움이 됐어요">👍</button>
  <button class="fb-btn down" title="아쉬워요">👎</button>
  <div class="fb-sep"></div>
  <button class="fb-btn copy" title="복사">복사</button>
  <button class="fb-btn regen" title="다시 생성">다시</button>
</div>
